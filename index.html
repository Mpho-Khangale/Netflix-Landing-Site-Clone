<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Netflix Landing Page</title>

  <link rel="icon" href="assets/images/favicon.ico">

  </head>

  <body>
  <!-- HERO SECTION -->

  <header class="hero">

    <!-- NAVIGATION -->
    <nav class="navbar">

      <!-- NETFLIX LOGO -->
      <img
        src="assets/images/netflix-logo.png"
        alt="Netflix Logo"
        class="logo"
      >

      <!-- SIGN IN BUTTON -->
      <button class="sign-in-btn">
        Sign In
      </button>

    </nav>

    <!-- HERO CONTENT -->
    <div class="hero-content">

      <h1>
        Unlimited movies, TV shows and more
      </h1>

      <h3>
        Watch anywhere. Cancel anytime.
      </h3>

      <p>
        Ready to watch? Enter your email to create or restart your membership.
      </p>

      <!-- GET STARTED FORM -->
      <form class="email-signup">

        <input
          type="email"
          placeholder="Email address"
          required
        >

        <button type="submit">
          Get Started
        </button>

      </form>

    </div>

  </header>

  <section class="trending">

  <h2>Trending Now</h2>

  <div class="carousel-wrapper">

    <!-- LEFT ARROW -->
    <button class="arrow left">&#10094;</button>

    <!-- SCROLLABLE ROW -->
    <div class="carousel">

      <div class="movie">
        <span class="rank">1</span>
        <img src="assets/images/movie1.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">2</span>
        <img src="assets/images/movie2.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">3</span>
        <img src="assets/images/movie3.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">4</span>
        <img src="assets/images/movie4.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">5</span>
        <img src="assets/images/movie5.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">6</span>
        <img src="assets/images/movie6.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">7</span>
        <img src="assets/images/movie7.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">8</span>
        <img src="assets/images/movie8.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">9</span>
        <img src="assets/images/movie9.jpg" alt="">
      </div>

      <div class="movie">
        <span class="rank">10</span>
        <img src="assets/images/movie10.jpg" alt="">
      </div>

    </div>

    <!-- RIGHT ARROW -->
    <button class="arrow right">&#10095;</button>

  </div>

</section>


</body>
